name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release, for example 0.3.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update version files
        run: python scripts/bump_version.py --version "${{ inputs.version }}"

      - name: Validate release metadata
        run: |
          python scripts/check_version_sync.py
          python scripts/check_changelog.py

      - name: Commit release preparation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION pyproject.toml CHANGELOG.md src/sales_analytics/__init__.py
          git commit -m "chore: prepare release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git push origin "v${{ inputs.version }}"
